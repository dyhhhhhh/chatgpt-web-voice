<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>语音通话</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #0d0d0d;
      --sub: #6b7280;
      --line: #e5e7eb;
      --green: #10a37f;
      --green-press: #0e8f70;
      --red: #ef4444;
      --red-press: #dc2626;
      --shadow: 0 10px 40px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
    }
    .brand {
      position: fixed; top: 18px; left: 0; right: 0;
      text-align: center; color: var(--sub); font-size: 13px; letter-spacing: .02em;
    }
    .stage {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 22px 22px;
      text-align: center;
    }
    .orb-wrap {
      position: relative;
      width: 220px; height: 220px;
      margin: 8px auto 18px;
      display: grid; place-items: center;
    }
    .orb {
      width: 150px; height: 150px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #7dffe0 0%, #10a37f 42%, #0b7f64 78%, #075a48 100%);
      box-shadow: 0 0 0 0 rgba(16,163,127,.35), 0 20px 50px rgba(16,163,127,.25);
      transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
      filter: saturate(1);
    }
    .orb.idle { animation: breath 2.8s ease-in-out infinite; }
    .orb.listening { animation: pulse 1.6s ease-in-out infinite; }
    .orb.speaking {
      animation: speak 0.9s ease-in-out infinite;
      box-shadow: 0 0 0 12px rgba(16,163,127,.12), 0 20px 60px rgba(16,163,127,.35);
    }
    .orb.connecting { filter: grayscale(.2) brightness(.95); animation: breath 1.2s ease-in-out infinite; }
    .orb.error { background: radial-gradient(circle at 35% 30%, #fecaca, #ef4444 60%, #991b1b); box-shadow: none; }
    @keyframes breath {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16,163,127,.28); }
      50% { transform: scale(1.06); box-shadow: 0 0 0 18px rgba(16,163,127,.00); }
    }
    @keyframes speak {
      0%,100% { transform: scale(1.02); }
      50% { transform: scale(1.1); }
    }
    .status {
      font-size: 28px; font-weight: 650; letter-spacing: -0.02em; margin: 0 0 6px;
    }
    .sub {
      color: var(--sub); font-size: 14px; min-height: 20px; margin: 0 0 18px;
    }
    .meters {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
    }
    .meter-card {
      background: #fafafa; border: 1px solid var(--line); border-radius: 14px; padding: 10px;
      text-align: left;
    }
    .meter-card span { display:block; font-size: 12px; color: var(--sub); margin-bottom: 6px; }
    meter { width: 100%; height: 14px; }
    .controls {
      display: flex; justify-content: center; align-items: center; gap: 14px; margin: 8px 0 4px;
    }
    .btn-main {
      width: 76px; height: 76px; border-radius: 50%; border: 0; cursor: pointer;
      display: grid; place-items: center; font-size: 15px; font-weight: 650; color: #fff;
      background: var(--green); box-shadow: 0 10px 24px rgba(16,163,127,.35);
    }
    .btn-main:active { background: var(--green-press); transform: scale(.98); }
    .btn-main.stop {
      background: var(--red); box-shadow: 0 10px 24px rgba(239,68,68,.28);
    }
    .btn-main.stop:active { background: var(--red-press); }
    .btn-side {
      width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--line);
      background: #fff; cursor: pointer; color: #111; font-size: 18px;
    }
    .btn-side:disabled { opacity: .4; cursor: not-allowed; }
    .device {
      margin-top: 14px; text-align: left;
    }
    .device label { font-size: 12px; color: var(--sub); }
    select, input[type=password], input[type=text] {
      width: 100%; margin-top: 6px; border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 12px; background: #fff; font-size: 14px;
    }
    .advanced {
      margin-top: 10px; text-align: left;
    }
    .advanced summary {
      cursor: pointer; color: var(--sub); font-size: 13px; user-select: none;
    }
    .advanced .box { margin-top: 10px; }

    .github-promo {
      position: fixed; left: 0; right: 0; bottom: 10px;
      text-align: center; z-index: 20; pointer-events: none;
    }
    .github-promo a {
      pointer-events: auto;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px;
      background: rgba(255,255,255,.92); border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      color: #111; text-decoration: none; font-size: 12px;
    }
    .github-promo a:hover { border-color: #10a37f; color: #0b7f64; }
    .github-promo img { height: 16px; width: 16px; }
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: rgba(17,24,39,.92); color: #fff; padding: 10px 14px; border-radius: 999px;
      font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s ease;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; }
    audio { display: none; }
    .composer {
      margin-top: 14px; text-align: left;
      border-top: 1px solid var(--line); padding-top: 12px;
    }
    .composer-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .composer textarea {
      flex: 1; min-height: 44px; max-height: 120px; resize: vertical;
      border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      font-size: 14px; font-family: inherit; background: #fff;
    }
    .composer .btn-send, .composer .btn-file {
      height: 44px; min-width: 44px; border-radius: 12px; border: 1px solid var(--line);
      background: #fff; cursor: pointer; font-size: 14px; padding: 0 12px;
    }
    .composer .btn-send {
      background: var(--green); color: #fff; border-color: transparent; font-weight: 650;
    }
    .composer .btn-send:disabled, .composer .btn-file:disabled { opacity: .45; cursor: not-allowed; }
    .composer .hint { margin-top: 6px; font-size: 12px; color: var(--sub); min-height: 16px; }
    .composer .pending-file {
      display: none; align-items: center; justify-content: space-between; gap: 8px;
      margin-top: 8px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 12px;
      background: #fafafa; font-size: 12px; color: var(--sub);
    }
    .composer .pending-file.show { display: flex; }
    .composer .pending-file span {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .composer .pending-file button {
      border: 0; background: transparent; cursor: pointer; color: var(--sub); font-size: 16px;
      width: 24px; height: 24px; border-radius: 999px;
    }
    .composer .pending-file button:hover { background: #f0f0f0; color: var(--text); }
    .transcript {
      margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); text-align: left;
    }
    .transcript-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px;
    }
    .transcript-title { font-size: 13px; font-weight: 650; }
    .transcript-meta { color: var(--sub); font-size: 12px; }
    .transcript-actions { display: flex; gap: 6px; }
    .transcript-action {
      width: 30px; height: 30px; padding: 0; border: 1px solid var(--line); border-radius: 50%;
      background: #fff; color: var(--sub); cursor: pointer; font-size: 16px; line-height: 1;
    }
    .transcript-action:hover { color: var(--text); background: #fafafa; }
    .transcript-list {
      height: 210px; overflow-y: auto; overscroll-behavior: contain; border: 1px solid var(--line); border-radius: 12px;
      background: #fafafa; padding: 4px 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .caption-empty { margin: 0; padding: 18px 4px; color: var(--sub); font-size: 13px; text-align: center; }
    .caption-log-line {
      padding: 7px 0; border-bottom: 1px solid #eceef0; font-size: 12px; line-height: 1.55;
      overflow-wrap: anywhere; white-space: pre-wrap;
    }
    .caption-log-line:last-child { border-bottom: 0; }
    .caption-log-time { color: var(--sub); }
    .caption-log-role { font-weight: 700; color: var(--sub); }
    .caption-log-role.user { color: var(--green); }
    .caption-log-content { color: var(--text); }
  </style>
</head>
<body>
  <div class="brand">语音通话 · <a href="https://github.com/dyhhhhhh/chatgpt-web-voice" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline;text-underline-offset:2px">Open Source</a></div>
  <div class="wrap">
    <div class="stage">
      <div class="orb-wrap"><div id="orb" class="orb idle"></div></div>
      <div id="statusText" class="status">准备就绪</div>
      <div id="subText" class="sub">点击下方按钮开始</div>

      <div class="meters">
        <div class="meter-card"><span>我的声音</span><meter id="localLevel" min="0" max="1" value="0"></meter></div>
        <div class="meter-card"><span>对方声音</span><meter id="remoteLevel" min="0" max="1" value="0"></meter></div>
      </div>

      <div class="controls">
        <button type="button" class="btn-side" id="btnMute" title="静音" disabled>🎤</button>
        <button type="button" class="btn-main" id="btnMain" title="开始">开始</button>
        <button type="button" class="btn-side" id="btnSpeaker" title="播放" disabled>🔊</button>
      </div>

      <div class="composer">
        <div class="composer-row">
          <textarea id="textInput" placeholder="通话中可发文本 / 图片…" disabled></textarea>
          <button type="button" class="btn-file" id="btnFile" title="发送图片" disabled>📎</button>
          <button type="button" class="btn-send" id="btnSend" title="发送文本" disabled>发送</button>
        </div>
        <input id="fileInput" type="file" accept="image/*" style="display:none" />
        <div id="pendingFile" class="pending-file">
          <span id="pendingFileName"></span>
          <button type="button" id="btnClearFile" title="移除图片">×</button>
        </div>
        <div id="composerHint" class="hint">开始通话后可发送文本和图片</div>
      </div>

      <section class="transcript" aria-label="本次通话字幕">
        <div class="transcript-head">
          <div>
            <div class="transcript-title">实时字幕</div>
            <div id="transcriptMeta" class="transcript-meta">本次通话，刷新后清空</div>
          </div>
          <div class="transcript-actions">
            <button type="button" class="transcript-action" id="btnExportTranscript" title="导出本次字幕" aria-label="导出本次字幕">&#8595;</button>
            <button type="button" class="transcript-action" id="btnClearTranscript" title="清空显示字幕" aria-label="清空显示字幕">&#215;</button>
          </div>
        </div>
        <div id="transcriptList" class="transcript-list" aria-live="polite"><p class="caption-empty">通话开始后会在这里显示字幕</p></div>
      </section>

      <div class="device">
        <label>麦克风</label>
        <select id="micSelect"><option value="">选择麦克风…</option></select>
      </div>

      <details class="advanced">
        <summary>高级设置</summary>
        <div class="box">
          <label style="font-size:12px;color:var(--sub)">登录密钥</label>
          <input id="token" type="password" placeholder="管理密钥 / API Key" />
          <div class="row" style="margin-top:8px">
            <label style="flex:1">voice
              <select id="voice">
                <option value="fathom">Arbor - 随和多才</option>
                <option value="cove" selected>Cove - 沉稳直率</option>
                <option value="juniper">Juniper - 开放豁达</option>
                <option value="orbit">Spruce - 冷静坚定</option>
                <option value="breeze">Breeze - 活泼认真</option>
                <option value="maple">Maple - 开朗直率</option>
                <option value="glimmer">Sol - 聪慧随性</option>
                <option value="ember">Ember - 自信乐观</option>
                <option value="vale">Vale - 聪颖好奇</option>
              </select>
            </label>
            <input id="voiceMode" type="hidden" value="wingman" />
          </div>
          <label style="display:block;margin-top:10px">自动打断灵敏度
            <select id="interruptSensitivity">
              <option value="conservative">保守 - 适合外放或嘈杂环境</option>
              <option value="balanced" selected>标准 - 平衡响应与误触</option>
              <option value="sensitive">灵敏 - 小声插话也会打断</option>
            </select>
          </label>
        </div>
      </details>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <audio id="remoteAudio" autoplay playsinline></audio>

<script>
(function () {
  'use strict';

  var orb = document.getElementById('orb');
  var statusText = document.getElementById('statusText');
  var subText = document.getElementById('subText');
  var localLevelEl = document.getElementById('localLevel');
  var remoteLevelEl = document.getElementById('remoteLevel');
  var micSelect = document.getElementById('micSelect');
  var tokenEl = document.getElementById('token');
  var voiceEl = document.getElementById('voice');
  var remoteAudio = document.getElementById('remoteAudio');
  var btnMain = document.getElementById('btnMain');
  var btnMute = document.getElementById('btnMute');
  var btnSpeaker = document.getElementById('btnSpeaker');
  var toastEl = document.getElementById('toast');
  var textInput = document.getElementById('textInput');
  var btnSend = document.getElementById('btnSend');
  var btnFile = document.getElementById('btnFile');
  var fileInput = document.getElementById('fileInput');
  var pendingFile = document.getElementById('pendingFile');
  var pendingFileName = document.getElementById('pendingFileName');
  var btnClearFile = document.getElementById('btnClearFile');
  var composerHint = document.getElementById('composerHint');
  var transcriptList = document.getElementById('transcriptList');
  var transcriptMeta = document.getElementById('transcriptMeta');
  var btnExportTranscript = document.getElementById('btnExportTranscript');
  var btnClearTranscript = document.getElementById('btnClearTranscript');
  var interruptSensitivity = document.getElementById('interruptSensitivity');

  var pc = null;
  var previewPc = null;
  var previewAudio = null;
  var previewMicStream = null;
  var previewTimer = 0;
  var previewStarting = false;
  var localStream = null;
  var remoteStream = null;
  var audioCtx = null;
  var localAnalyser = null, remoteAnalyser = null;
  var localSource = null, remoteSource = null;
  var localRaf = 0, remoteRaf = 0;
  var starting = false;
  var inCall = false;
  var muted = false;
  var sending = false;
  var conversationId = '';
  var parentMessageId = '';
  var voiceSessionId = '';
  var dcChannel = null; // WebRTC datachannel: oai-events
  var pendingImageFile = null;
  var isManagedVoiceHost = (
    window.location.hostname === 'voice.peekcart.com'
    || window.location.hostname === 'vocie.peekcart.com'
  ); // managed host: Caddy injects Authorization for /api/voice/*
  var tokenStorageKey = 'chatgpt_web_voice_auth_key';
  var voiceStorageKey = 'chatgpt_web_voice_voice_v1';
  var chatgptVoiceOptions = ['breeze', 'cove', 'ember', 'fathom', 'glimmer', 'juniper', 'maple', 'orbit', 'vale'];
  var chatgptVoiceAliases = { arbor: 'fathom', sol: 'glimmer', spruce: 'orbit' };
  var chatgptVoiceMeta = {
    fathom: { name: 'Arbor', description: '随和多才' },
    cove: { name: 'Cove', description: '沉稳直率' },
    juniper: { name: 'Juniper', description: '开放豁达' },
    orbit: { name: 'Spruce', description: '冷静坚定' },
    breeze: { name: 'Breeze', description: '活泼认真' },
    maple: { name: 'Maple', description: '开朗直率' },
    glimmer: { name: 'Sol', description: '聪慧随性' },
    ember: { name: 'Ember', description: '自信乐观' },
    vale: { name: 'Vale', description: '聪颖好奇' }
  };
  var maxLocalHistoryRounds = 12;
  var maxLocalHistoryItems = maxLocalHistoryRounds * 2;
  var maxLocalContextChars = 8000;
  var currentSessionHistory = [];
  var currentTranscript = [];
  var maxTranscriptItems = 120;
  var maxTranscriptChars = 32000;
  var maxTranscriptItemChars = 1000;
  var streamingCaptionRole = '';
  var streamingCaptionText = '';
  var streamingCaptionMessageId = '';
  var lastAssistantHistoryAt = 0;
  var remoteSpeakingUntil = 0;
  var AUTO_INTERRUPT_RMS = 0.20;
  var AUTO_INTERRUPT_HOLD_MS = 600;
  var AUTO_INTERRUPT_COOLDOWN_MS = 1800;
  var autoInterruptProfiles = {
    conservative: { label: '保守', rms: 0.27, holdMs: 880 },
    balanced: { label: '标准', rms: AUTO_INTERRUPT_RMS, holdMs: AUTO_INTERRUPT_HOLD_MS },
    sensitive: { label: '灵敏', rms: 0.15, holdMs: 430 }
  };
  var currentAutoInterruptRms = AUTO_INTERRUPT_RMS;
  var currentAutoInterruptHoldMs = AUTO_INTERRUPT_HOLD_MS;
  var autoInterruptCalibrationEndsAt = 0;
  var autoInterruptCalibrationSamples = [];
  var autoInterruptAmbientRms = 0;
  var assistantSpeaking = false;
  var autoInterruptStartedAt = 0;
  var autoInterruptCooldownUntil = 0;
  var awaitingInterruptAck = false;
  var playbackSuppressed = false;
  var pendingVoicePreview = false;
  var suppressPreviewAssistantUntil = 0;
  var micPermissionWarmed = false;
  // In-call account failover: detect dead token / dropped call and reconnect with a new account.
  var userWantsCall = false;
  var autoFailoverEnabled = true;
  var autoFailoverMaxAttempts = 3;
  var autoFailoverCooldownMs = 2200;
  var autoFailoverAttempts = 0;
  var autoFailoverTimer = 0;
  var autoFailoverInProgress = false;
  var lastFailoverReason = '';
  var disconnectGraceTimer = 0;

  function clampText(value, limit) {
    var text = String(value || '').trim();
    return text.length > limit ? text.slice(0, Math.max(0, limit - 1)) + '...' : text;
  }

  function clearStoredConversationHistory() {
    try {
      localStorage.removeItem('chatgpt_web_voice_history_v1');
      localStorage.removeItem('chatgpt_web_voice_history_v1');
    } catch (e) {}
  }

  function loadCurrentSessionHistory() {
    return currentSessionHistory.filter(function (item) {
      return item && (item.role === 'user' || item.role === 'assistant') && String(item.content || '').trim();
    }).slice(-maxLocalHistoryItems);
  }

  function saveCurrentSessionHistory(items) {
    currentSessionHistory = (items || []).slice(-maxLocalHistoryItems);
  }

  function resetCurrentSessionHistory() {
    currentSessionHistory = [];
    lastAssistantHistoryAt = 0;
  }

  function formatTranscriptTime(value) {
    try {
      return new Date(value).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch (e) {
      return '';
    }
  }

  function renderTranscript() {
    if (!transcriptList) return;
    var shouldFollow = transcriptList.scrollHeight - transcriptList.scrollTop - transcriptList.clientHeight < 36;
    transcriptList.textContent = '';
    if (!currentTranscript.length) {
      var empty = document.createElement('p');
      empty.className = 'caption-empty';
      empty.textContent = '通话开始后会在这里显示字幕';
      transcriptList.appendChild(empty);
      return;
    }
    var fragment = document.createDocumentFragment();
    currentTranscript.forEach(function (item) {
      var row = document.createElement('div');
      row.className = 'caption-log-line';
      var time = document.createElement('span');
      time.className = 'caption-log-time';
      time.textContent = '[' + formatTranscriptTime(item.ts) + '] ';
      var role = document.createElement('span');
      role.className = 'caption-log-role ' + item.role;
      role.textContent = item.role === 'assistant' ? 'AI' : '你';
      var content = document.createElement('span');
      content.className = 'caption-log-content';
      var attachmentText = (item.attachments || []).length ? ' [附图：' + item.attachments.join('、') + ']' : '';
      content.textContent = ' ' + item.content + attachmentText;
      row.appendChild(time);
      row.appendChild(role);
      row.appendChild(content);
      fragment.appendChild(row);
    });
    transcriptList.appendChild(fragment);
    if (shouldFollow) transcriptList.scrollTop = transcriptList.scrollHeight;
  }

  function transcriptItemChars(item) {
    return String(item.content || '').length + (item.attachments || []).join('').length + 24;
  }

  function trimTranscriptBuffer() {
    if (currentTranscript.length > maxTranscriptItems) currentTranscript.splice(0, currentTranscript.length - maxTranscriptItems);
    var totalChars = currentTranscript.reduce(function (total, item) { return total + transcriptItemChars(item); }, 0);
    while (totalChars > maxTranscriptChars && currentTranscript.length > 1) {
      totalChars -= transcriptItemChars(currentTranscript.shift());
    }
  }

  function recordTranscript(role, content, attachments) {
    var clean = clampText(content, maxTranscriptItemChars);
    if (!clean && !(attachments && attachments.length)) return;
    var names = (attachments || []).map(function (name) { return String(name || '').trim(); }).filter(Boolean).slice(0, 6);
    var next = { role: role, content: clean || '发送了一张图片', attachments: names, ts: Date.now() };
    var last = currentTranscript[currentTranscript.length - 1];
    if (last && last.role === role && JSON.stringify(last.attachments || []) === JSON.stringify(names) && next.ts - Number(last.ts || 0) < 90000) {
      var previous = String(last.content || '');
      if (previous === next.content || next.content.indexOf(previous) === 0 || previous.indexOf(next.content) === 0) {
        last.content = next.content.length >= previous.length ? next.content : previous;
        last.ts = next.ts;
        renderTranscript();
        return;
      }
    }
    currentTranscript.push(next);
    trimTranscriptBuffer();
    renderTranscript();
  }

  function resetCurrentTranscript() {
    currentTranscript = [];
    renderTranscript();
  }

  function exportTranscript() {
    if (!currentTranscript.length) { toast('暂无可导出的字幕'); return; }
    var rows = currentTranscript.map(function (item) {
      var role = item.role === 'assistant' ? 'AI' : '你';
      var attachments = (item.attachments || []).length ? ' [附图：' + item.attachments.join('、') + ']' : '';
      return '[' + formatTranscriptTime(item.ts) + '] ' + role + '：' + item.content + attachments;
    });

        nextCaption.messageId !== priorCaptionMessageId ||
        nextCaption.text !== priorCaptionText
      )) {
        rememberDcText(nextCaption.role, nextCaption.text);
      }
      updateComposerState();
    }
    // Realtime 风格 transcript 事件（若有），用于刷新后恢复本地上下文。
    if (t.indexOf('input_audio') >= 0 && t.indexOf('transcription') >= 0) {
      rememberDcText('user', extractTranscriptText(obj, p));
    } else if (t.indexOf('audio_transcript') >= 0 || t.indexOf('response.audio_transcript') >= 0) {
      rememberDcText('assistant', extractTranscriptText(obj, p));
    }

    // Account / quota signals from realtime voice DC.
    if (t === 'usage_update' || (p && p.type === 'usage_update')) {
      var usage = (p && p.type === 'usage_update') ? p : (obj.payload && obj.payload.type === 'usage_update' ? obj.payload : obj);
      var instr = usage.instructions || (usage.payload && usage.payload.instructions) || {};
      var rlm = usage.rate_limit_message || (usage.payload && usage.payload.rate_limit_message) || null;
      var audioLeft = usage.audio_s;
      if (audioLeft == null && usage.limits && usage.limits.audio) audioLeft = usage.limits.audio.remaining_seconds;
      if (instr && instr.hang_up === true) {
        log('usage hang_up', usage);
        scheduleAccountFailover('usage_hang_up', 300);
      } else if (rlm && (rlm.exceed_limit_message || rlm.exceeded || rlm.limit_reached)) {
        log('usage rate_limit exceed', rlm);
        scheduleAccountFailover('usage_rate_limit', 300);
      } else if (typeof audioLeft === 'number' && audioLeft <= 5) {
        log('usage audio nearly empty', audioLeft);
        scheduleAccountFailover('usage_audio_exhausted', 800);
      }
    }
    if (t === 'tool_update' || (p && p.type === 'tool_update')) {
      var tu = (p && p.type === 'tool_update') ? p : obj;
      var ut = tu.update_type || (tu.payload && tu.payload.update_type) || '';
      if (String(ut).toLowerCase() === 'hangup' || String(ut).toLowerCase() === 'hang_up') {
        log('tool_update hangup', tu);
        scheduleAccountFailover('tool_hangup', 300);
      }
    }
  }

  function cancelDisconnectGrace() {
    if (disconnectGraceTimer) {
      clearTimeout(disconnectGraceTimer);
      disconnectGraceTimer = 0;
    }
  }

  function cancelAutoFailover() {
    cancelDisconnectGrace();
    if (autoFailoverTimer) {
      clearTimeout(autoFailoverTimer);
      autoFailoverTimer = 0;
    }
  }

  function scheduleAccountFailover(reason, delayMs) {
    if (!autoFailoverEnabled || !userWantsCall) return;
    if (autoFailoverInProgress || starting) return;
    if (autoFailoverAttempts >= autoFailoverMaxAttempts) {
      log('failover exhausted', reason, autoFailoverAttempts);
      setUI('error', '已断开', '账号多次失效，请稍后重试或检查账号池');
      toast('多次切换账号仍失败，请检查账号池');
      userWantsCall = false;
      return;
    }
    // Collapse duplicate signals into one reconnect.
    if (autoFailoverTimer) {
      log('failover already scheduled', reason, 'pending=', lastFailoverReason);
      return;
    }
    lastFailoverReason = String(reason || 'unknown');
    var wait = (delayMs == null ? autoFailoverCooldownMs : delayMs);
    if (wait < 0) wait = 0;
    log('schedule failover', lastFailoverReason, 'in', wait, 'ms', 'attempt', autoFailoverAttempts + 1);
    autoFailoverTimer = setTimeout(function () {
      autoFailoverTimer = 0;
      runAccountFailover(lastFailoverReason);
    }, wait);
  }

  async function runAccountFailover(reason) {
    if (!autoFailoverEnabled || !userWantsCall) return;
    if (autoFailoverInProgress) return;
    if (autoFailoverAttempts >= autoFailoverMaxAttempts) {
      setUI('error', '已断开', '账号多次失效，请稍后重试');
      userWantsCall = false;
      return;
    }
    autoFailoverInProgress = true;
    autoFailoverAttempts += 1;
    var n = autoFailoverAttempts;
    var max = autoFailoverMaxAttempts;
    log('run failover', reason, n + '/' + max);
    try {
      setUI('connecting', '切换账号中', '检测到账号/连接异常，正在换号重连 (' + n + '/' + max + ')');
      toast('账号异常，正在切换账号重连 (' + n + '/' + max + ')…');
      await stopCall(false, { fromFailover: true, preserveTranscript: true, preserveHistory: true });
      // Ensure next session picks a fresh account binding.
      voiceSessionId = '';
      await startCall({ failover: true });
      if (inCall || starting) {
        toast('已切换账号并重新连接');
      }
    } catch (e) {
      log('failover error', String(e));
      setUI('error', '切换失败', String(e.message || e));
      toast('切换账号失败: ' + String(e.message || e));
      if (userWantsCall && autoFailoverAttempts < autoFailoverMaxAttempts) {
        scheduleAccountFailover('failover_retry', autoFailoverCooldownMs);
      } else {
        userWantsCall = false;
      }
    } finally {
      autoFailoverInProgress = false;
    }
  }

      fd.append('voice_session_id', voiceSessionId);
      var resp = await fetch('/api/voice/upload-image', {
        method: 'POST',

        body: fd
      });
      var data = {};
      try { data = await resp.json(); } catch (e) {}
      if (!resp.ok) {
        var msg = (data && data.detail && (data.detail.error || JSON.stringify(data.detail))) || ('HTTP ' + resp.status);
        toast(msg);
        log('http send image fail', msg, data);
        if (resp.status === 401 || /token|账号|失效|unauthorized|invalid access/i.test(String(msg))) {
          setUI('connecting', '切换账号中', '图片接口鉴权失败，准备换号');
          scheduleAccountFailover('upload_401', 200);

      var text = (textInput.value || '').trim();
      var parts = [{
        content_type: 'image_asset_pointer',

        width: Number(data.width || 0),
        height: Number(data.height || 0)
      }];
      var messageText = withCurrentSessionContext(text, true);
      if (messageText) parts.push(messageText);
      var attachment = {
        id: data.file_id,
        size: Number(data.size || 0),
        name: data.name || file.name || 'image.png',
        mimeType: data.mimeType || file.type || 'image/png',
        width: Number(data.width || 0),
        height: Number(data.height || 0)
      };
      var message = buildBaseUserMessage({
        content_type: 'multimodal_text',
        parts: parts
      });
      message.metadata.attachments = [attachment];
      sendRelayMessage(message);
      parentMessageId = message.id;
      textInput.value = '';
      clearPendingImage();
      rememberLocalMessage('user', text || '发送了一张图片', [attachment.name]);
      showReply('（图片已通过实时通道发送）\nfile: ' + data.file_id, false);
      toast('图片已发送到语音会话');
      log('dc relay image ok', data.file_id, message.id);
      setUI('listening', '聆听中', '图片已进入当前实时会话');
    } catch (e) {
      toast(String(e.message || e));
      log('send image error', String(e));
      setUI('error', '发送失败', String(e.message || e));
    } finally {
      sending = false;
      updateComposerState();
    }
  }

  function isVirtualMic(label) {
    return /todesk|virtual|cable|stereo mix|vb-audio|voicemeeter|blackhole/i.test(label || '');
  }
  function scoreMic(label) {
    label = label || '';
    if (isVirtualMic(label)) return -100;
    var s = 10;
    if (/ugreen|usb|headset|realtek|麦克风|microphone|array/i.test(label)) s += 20;
    if (/默认|default|通信|communication/i.test(label)) s += 5;
    return s;
  }

  async function refreshMics() {
    try {
      var devices = await navigator.mediaDevices.enumerateDevices();
      var inputs = devices.filter(function (d) { return d.kind === 'audioinput'; });
      var prev = micSelect.value;
      micSelect.innerHTML = '';
      var bestId = '', best = -999;
      inputs.forEach(function (d, i) {
        var opt = document.createElement('option');
        opt.value = d.deviceId;
        var label = d.label || ('麦克风 ' + (i + 1));
        opt.textContent = isVirtualMic(label) ? (label + '（不推荐）') : label;
        micSelect.appendChild(opt);
        var sc = scoreMic(label);
        if (sc > best) { best = sc; bestId = d.deviceId; }
      });
      if (!inputs.length) {
        var o = document.createElement('option');
        o.value = ''; o.textContent = '未找到麦克风';
        micSelect.appendChild(o);
      } else if (prev) {
        micSelect.value = prev;
      } else if (bestId) {
        micSelect.value = bestId;
      }
      log('mics', inputs.map(function (d) { return d.label; }), 'selected', micSelect.options[micSelect.selectedIndex] && micSelect.options[micSelect.selectedIndex].textContent);
    } catch (e) {
      log('refreshMics fail', String(e));
    }
  }

  async function ensureCtx() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
  }

  function startMeter(stream, which) {
    try {
      if (!stream) return;
      ensureCtx();
      if (!audioCtx) return;
      var source = audioCtx.createMediaStreamSource(stream);
      var analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);
      var data = new Uint8Array(analyser.frequencyBinCount);
      function tick() {
        analyser.getByteTimeDomainData(data);
        var sum = 0;
        for (var i = 0; i < data.length; i++) {
          var v = (data[i] - 128) / 128;
          sum += v * v;
        }
        var rms = Math.min(1, Math.sqrt(sum / data.length) * 4);
        if (which === 'local') {
          localLevelEl.value = rms;
          evaluateAutoInterrupt(rms);
          localRaf = requestAnimationFrame(tick);
        } else {
          remoteLevelEl.value = rms;
          // Hold remote speaking state through short pauses in the assistant audio.
          if (inCall && !playbackSuppressed && rms > 0.08) {
            remoteSpeakingUntil = Date.now() + 900;
            markAssistantSpeaking();
            if (statusText.textContent !== '回答中') setUI('speaking', '回答中', '正在说话');
          } else if (inCall && statusText.textContent === '回答中' && Date.now() > remoteSpeakingUntil) {
            markAssistantListening();
            setUI('listening', '聆听中', '请继续说');
          }
          remoteRaf = requestAnimationFrame(tick);
        }
      }
      if (which === 'local') {
        if (localRaf) cancelAnimationFrame(localRaf);
        if (localSource) try { localSource.disconnect(); } catch (e) {}
        localSource = source; localAnalyser = analyser; tick();
      } else {
        if (remoteRaf) cancelAnimationFrame(remoteRaf);
        if (remoteSource) try { remoteSource.disconnect(); } catch (e) {}
        remoteSource = source; remoteAnalyser = analyser; tick();
      }
    } catch (e) {
      log('meter fail', String(e));
    }
  }

  async function requestMic() {
    if (!window.isSecureContext) throw new Error('请使用 HTTPS 打开此页面');
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('浏览器不支持麦克风');
    await refreshMics();
    var deviceId = micSelect.value;
    var constraints = deviceId
      ? { video: false, audio: { deviceId: { exact: deviceId }, echoCancellation: true, noiseSuppression: true } }
      : { video: false, audio: true };
    var stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch (e) {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    }
    var label = (stream.getAudioTracks()[0] && stream.getAudioTracks()[0].label) || '';
    if (isVirtualMic(label)) {
      toast('当前是虚拟麦克风，可能无法被识别，请换成真实麦克风');
    }
    startMeter(stream, 'local');
    await refreshMics();
    return stream;
  }

  async function ensureRemotePlay(force) {
    try {
      await ensureCtx();
      if (!remoteAudio.srcObject) return;
      if (playbackSuppressed && !force) return;
      remoteAudio.muted = false;
      remoteAudio.volume = 1;
      var p = remoteAudio.play();
      if (p && p.then) await p;
      log('remote playing', !remoteAudio.paused);
    } catch (e) {
      log('play fail', String(e));
      toast('点击扬声器按钮解锁声音');
    }
  }

  async function startCall(options) {
    options = options || {};
    var isFailover = !!options.failover;
    if (starting || (inCall && !isFailover)) return;
    starting = true;
    userWantsCall = true;
    try {
      await stopVoicePreviewOnly();
      var token = (tokenEl.value || '').trim();
      if (!token && !isManagedVoiceHost) {
        // open advanced settings visually
        document.querySelector('.advanced') && (document.querySelector('.advanced').open = true);
        toast('请先在高级设置填写登录密钥');
        tokenEl.focus();
        userWantsCall = false;
        return;
      }
      if (token) {
        try { localStorage.setItem(tokenStorageKey, token); } catch (e) {}
      }

      setUI('connecting', isFailover ? '切换账号中' : '连接中', isFailover ? '正在用新账号重建通话' : '正在开启麦克风');
      if (!isFailover) {
        await stopCall(false, { preparingRestart: true });
        resetCurrentSessionHistory();
        resetCurrentTranscript();
      } else {
        // Failover already stopped media; keep captions/history for UX.
        conversationId = '';
        parentMessageId = '';
        voiceSessionId = '';
      }
      updateTranscriptMeta();

      localStream = await requestMic();
      setUI('connecting', '连接中', '正在建立通话');

      pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun4.l.google.com:19302' }
        ],
        bundlePolicy: 'max-bundle'
      });

      try {
        var dc = pc.createDataChannel('oai-events', { negotiated: true, id: 0 });
        dcChannel = dc;
        dc.onopen = function () {
          log('dc open');
          updateComposerState();
          setTimeout(sendVoicePreviewGreeting, 700);
        };
        dc.onclose = function () {
          log('dc close');
          if (dcChannel === dc) dcChannel = null;
          updateComposerState();
        };
        dc.onerror = function (e) { log('dc error', e); };
        dc.onmessage = function (ev) {
          try {
            var obj = JSON.parse(ev.data);
            var inner = obj;
            if (obj.type === 'data_message' && typeof obj.data === 'string') inner = JSON.parse(obj.data);
            var t = inner.type || obj.type;
            log('dc', t, inner);
            if (t === 'state_update') {
              var st = (inner.payload && inner.payload.new_state) || '';
              if (st === 'listening') {
                markAssistantListening();
                setUI('listening', '聆听中', '我在听，请说话');
              }
              if (st === 'speaking' || st === 'responding') {
                markAssistantSpeaking();
                setUI('speaking', '回答中', '正在回复');
              }
              if (st === 'idle') {
                markAssistantListening();
                setUI('listening', '聆听中', '请继续说');
              }
            }
            handleDcPayload(obj);
          } catch (e) {
            log('dc raw', ev.data);
          }
        };
      } catch (e) { log('dc fail', String(e)); }

      localStream.getTracks().forEach(function (t) { pc.addTrack(t, localStream); });

      pc.ontrack = function (ev) {
        log('ontrack', ev.track.kind, 'muted=', ev.track.muted);
        if (ev.streams && ev.streams[0]) remoteStream = ev.streams[0];
        else {
          if (!remoteStream) remoteStream = new MediaStream();
          remoteStream.addTrack(ev.track);
        }
        remoteAudio.srcObject = remoteStream;
        ensureRemotePlay();
        startMeter(remoteStream, 'remote');
      };
      pc.oniceconnectionstatechange = function () {
        if (!pc) return;
        log('ice', pc.iceConnectionState);
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          cancelDisconnectGrace();
        }
        if (pc.iceConnectionState === 'failed') {
          if (userWantsCall && autoFailoverEnabled) {
            scheduleAccountFailover('ice_failed', 400);
          } else {
            setUI('error', '连接失败', '网络或代理异常');
            toast('连接失败');
          }
        }
      };
      pc.onconnectionstatechange = function () {
        if (!pc) return;
        log('conn', pc.connectionState);
        if (pc.connectionState === 'connected') {
          cancelDisconnectGrace();
          inCall = true;
          // Successful media connect clears the failover streak.
          autoFailoverAttempts = 0;
          lastFailoverReason = '';
          beginAutoInterruptCalibration();
          setUI('listening', '聆听中', isFailover ? '已切换账号，请继续说话' : '已连接，请开始说话');
          setTimeout(sendVoicePreviewGreeting, 700);
        }
        if (pc.connectionState === 'failed') {
          if (inCall || userWantsCall) {
            if (autoFailoverEnabled && userWantsCall) scheduleAccountFailover('connection_failed', 300);
            else setUI('error', '已断开', '通话结束');
          }
        }
        if (pc.connectionState === 'disconnected') {
          // Brief ICE blips are common; only failover after a short grace window.
          if ((inCall || userWantsCall) && autoFailoverEnabled && userWantsCall) {
            cancelDisconnectGrace();
            disconnectGraceTimer = setTimeout(function () {
              disconnectGraceTimer = 0;
              if (!pc) return;
              if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                scheduleAccountFailover('connection_disconnected', 0);
              }
            }, 2500);
          } else if (inCall) {
            setUI('error', '已断开', '通话结束');
          }
        }
        if (pc.connectionState === 'closed') {
          cancelDisconnectGrace();
        }
      };

      var offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
      await pc.setLocalDescription(offer);
      await new Promise(function (resolve) {
        if (pc.iceGatheringState === 'complete') return resolve();
        var t = setTimeout(resolve, 2500);
        pc.onicegatheringstatechange = function () {
          if (pc.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
        };
      });

      var resp = await fetch('/api/voice/session', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          ...authHeaders(token)
        },
        body: JSON.stringify({
          offer_sdp: pc.localDescription.sdp,
          voice: normalizeVoice(voiceEl.value),
          voice_mode: (document.getElementById('voiceMode').value || 'wingman').trim(),
          voice_session_id: voiceSessionId
        })
      });
      var data = {};
      try { data = await resp.json(); } catch (e) {}
      if (!resp.ok) {
        var msg = (data && data.detail && (data.detail.error || JSON.stringify(data.detail))) || ('HTTP ' + resp.status);
        log('session fail', resp.status, msg, data);
        if ((resp.status === 401 || resp.status === 503) && userWantsCall && autoFailoverEnabled && autoFailoverAttempts < autoFailoverMaxAttempts && isFailover) {
          setUI('error', '切换失败', msg);
          toast(msg);
          await stopCall(false, { fromFailover: true, preserveTranscript: true, preserveHistory: true });
          scheduleAccountFailover('session_' + resp.status, autoFailoverCooldownMs);
          return;
        }
        if ((resp.status === 401 || /token|账号|失效|unauthorized/i.test(String(msg))) && userWantsCall && autoFailoverEnabled && !isFailover && autoFailoverAttempts < autoFailoverMaxAttempts) {
          setUI('connecting', '切换账号中', '建连鉴权失败，准备换号');
          await stopCall(false, { fromFailover: true, preserveTranscript: true, preserveHistory: true });
          scheduleAccountFailover('session_401', 200);
          return;
        }
        setUI('error', '无法开始', msg);
        toast(msg);
        userWantsCall = false;
        await stopCall(false);
        return;
      }
      voiceSessionId = data.voice_session_id || data.session_id || '';
      log('session ok', data.account_email, data.proxy_source, isFailover ? 'failover' : 'normal');
      await pc.setRemoteDescription({ type: 'answer', sdp: data.answer_sdp });
      inCall = true;
      setUI('connecting', '连接中', '正在进入通话');
      await ensureRemotePlay();
      setTimeout(sendVoicePreviewGreeting, 700);
    } catch (e) {
      log('start error', String(e));
      setUI('error', '无法开始', String(e.message || e));
      toast(String(e.message || e));
      if (isFailover && userWantsCall && autoFailoverEnabled && autoFailoverAttempts < autoFailoverMaxAttempts) {
        await stopCall(false, { fromFailover: true, preserveTranscript: true, preserveHistory: true });
        scheduleAccountFailover('start_error', autoFailoverCooldownMs);
      } else {
        userWantsCall = false;
        await stopCall(false);
      }
    } finally {
      starting = false;
    }
  }

  async function stopCall(updateText, options) {
    if (updateText === undefined) updateText = true;
    options = options || {};
    var fromFailover = !!options.fromFailover;
    var preparingRestart = !!options.preparingRestart;
    // User hangup clears intent; failover/restart prep keeps userWantsCall.
    if (!fromFailover && !preparingRestart) {
      userWantsCall = false;
      cancelAutoFailover();
      autoFailoverAttempts = 0;
      lastFailoverReason = '';
    }
    clearInterval(0);
    if (localRaf) cancelAnimationFrame(localRaf);
    if (remoteRaf) cancelAnimationFrame(remoteRaf);
    localRaf = 0; remoteRaf = 0;
    try { if (dcChannel) dcChannel.close(); } catch (e) {}
    dcChannel = null;
    await stopVoicePreviewOnly();
    if (pc) { try { pc.close(); } catch (e) {} pc = null; }
    if (localStream) {
      localStream.getTracks().forEach(function (t) { t.stop(); });
      localStream = null;
    }
    remoteStream = null;
    remoteAudio.srcObject = null;
    localLevelEl.value = 0;
    remoteLevelEl.value = 0;
    inCall = false;
    muted = false;
    sending = false;
    remoteSpeakingUntil = 0;
    assistantSpeaking = false;
    autoInterruptStartedAt = 0;
    autoInterruptCooldownUntil = 0;
    currentAutoInterruptRms = AUTO_INTERRUPT_RMS;
    currentAutoInterruptHoldMs = AUTO_INTERRUPT_HOLD_MS;
    autoInterruptCalibrationEndsAt = 0;
    autoInterruptCalibrationSamples = [];
    autoInterruptAmbientRms = 0;
    awaitingInterruptAck = false;
    playbackSuppressed = false;
    conversationId = '';
    parentMessageId = '';
    streamingCaptionRole = '';
    streamingCaptionText = '';
    streamingCaptionMessageId = '';
    await releaseBackendVoiceSession();
    clearPendingImage();
    btnMute.textContent = '🎤';
    if (updateText && !fromFailover) setUI('idle', '准备就绪', '点击下方按钮开始');
    updateTranscriptMeta();
    updateComposerState();
  }

  function toggleMute() {
    if (!localStream) return;
    muted = !muted;
    localStream.getAudioTracks().forEach(function (t) { t.enabled = !muted; });
    btnMute.textContent = muted ? '🔇' : '🎤';
    toast(muted ? '已静音' : '麦克风已开');
  }

  function bind() {
    clearStoredConversationHistory();
    btnMain.onclick = function () {
      if (inCall || starting || autoFailoverInProgress || autoFailoverTimer) {
        userWantsCall = false;
        cancelAutoFailover();
        stopCall(true);
      } else {
        autoFailoverAttempts = 0;
        startCall();
      }
    };
    btnMute.onclick = toggleMute;
    btnSpeaker.onclick = function () { ensureRemotePlay(true); toast('已尝试解锁声音'); };
    btnExportTranscript.onclick = exportTranscript;
    btnClearTranscript.onclick = function () {
      resetCurrentTranscript();
      toast('已清空显示字幕');
    };
    interruptSensitivity.onchange = function () {
      beginAutoInterruptCalibration();
      toast(inCall ? '灵敏度已调整，正在重新校准环境声音' : '已调整自动打断灵敏度');
    };
    btnSend.onclick = sendTextMessage;
    btnFile.onclick = function () { fileInput.click(); };
    btnClearFile.onclick = clearPendingImage;
    fileInput.onchange = function () {
      var f = fileInput.files && fileInput.files[0];
      fileInput.value = '';
      if (f) setPendingImage(f);
    };
    textInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendTextMessage();
      }
    });
    renderTranscript();
    updateTranscriptMeta();
    if (isManagedVoiceHost) {
      tokenEl.value = '';
      tokenEl.disabled = true;
      tokenEl.placeholder = '已由 voice.peekcart.com 自动配置，打开即可使用';
    } else {
      var saved = '';
      try { saved = localStorage.getItem(tokenStorageKey) || ''; } catch (e) {}
      if (saved) tokenEl.value = saved;
      tokenEl.onchange = function () {
        try { localStorage.setItem(tokenStorageKey, (tokenEl.value || '').trim()); } catch (e) {}
      };
    }
    try {
      var savedVoice = normalizeVoice(localStorage.getItem(voiceStorageKey) || voiceEl.value);
      voiceEl.value = savedVoice;
    } catch (e) {
      voiceEl.value = normalizeVoice(voiceEl.value);
    }
    voiceEl.onchange = function () {
      voiceEl.value = normalizeVoice(voiceEl.value);
      pendingVoicePreview = false;
      try { localStorage.setItem(voiceStorageKey, voiceEl.value); } catch (e) {}
      if (inCall) {
        toast('正在独立试听，新音色下次正式语音生效');
      } else {
        toast('正在试听当前音色');
      }
      startVoicePreviewOnly(voiceEl.value);
    };
    setUI('idle', '准备就绪', '点击下方按钮开始');
    updateComposerState();
    if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
      navigator.mediaDevices.enumerateDevices().then(refreshMics).catch(function () {});
    }
    setTimeout(warmMicPermission, 600);
  }

  // expose for details label
  async function refreshMics() {
    try {
      var devices = await navigator.mediaDevices.enumerateDevices();
      var inputs = devices.filter(function (d) { return d.kind === 'audioinput'; });
      var prev = micSelect.value;
      micSelect.innerHTML = '';
      var bestId = '', best = -999;
      inputs.forEach(function (d, i) {
        var opt = document.createElement('option');
        opt.value = d.deviceId;
        var label = d.label || ('麦克风 ' + (i + 1));
        opt.textContent = isVirtualMic(label) ? (label + '（不推荐）') : label;
        micSelect.appendChild(opt);
        var sc = scoreMic(label);
        if (sc > best) { best = sc; bestId = d.deviceId; }
      });
      if (!inputs.length) {
        var o = document.createElement('option');
        o.value = ''; o.textContent = '未找到麦克风';
        micSelect.appendChild(o);
      } else if (prev) micSelect.value = prev;
      else if (bestId) micSelect.value = bestId;
    } catch (e) {}
  }
  function scoreMic(label) {
    label = label || '';
    if (isVirtualMic(label)) return -100;
    var s = 10;
    if (/ugreen|usb|headset|realtek|麦克风|microphone|array/i.test(label)) s += 20;
    if (/默认|default|通信|communication/i.test(label)) s += 5;
    return s;
  }

  try { bind(); }
  catch (e) {
    statusText.textContent = '页面异常';
    subText.textContent = String(e);
  }
})();
</script>
</body>
</html>
